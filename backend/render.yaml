# Render blueprint for the Stocked API.
# In the Render dashboard: New -> Blueprint -> point at this repo, root
# directory "backend". Render reads this file and provisions the service.
#
# DATABASE_URL and ALLOWED_ORIGIN are marked sync: false so Render prompts
# you to enter them manually instead of committing secrets to the repo.
# If you add a Render Postgres instance, you can also link its
# "Internal Database URL" here directly instead of typing it by hand.
services:
  - type: web
    name: stocked-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
